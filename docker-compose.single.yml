services:
  packetql:
    build:
      context: .
      dockerfile: docker/Dockerfile.single
    image: packetql:single
    container_name: packetql
    restart: unless-stopped
    environment:
      APP_MODE: ${APP_MODE:-demo}
      NDR_DATA_DIR: /data
      PARQUET_DATA_DIR: /data/parquet
      KAFKA_BOOTSTRAP_SERVERS: 127.0.0.1:9092
    ports:
      - "${HOST_HTTP_PORT:-3000}:3000"
    volumes:
      - ${HOST_DATA_PATH:-./.packetql-data}:/data
