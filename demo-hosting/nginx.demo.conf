server {
    listen 80;
    server_name _;

    client_max_body_size 5m;

    location = /api/v1/logs/current-source {
        proxy_pass http://packetql:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /api/v1/hunting/run {
        set $demo_sql_allowed 0;
        if ($request_body ~* "\"query\"\\s*:\\s*\"\\s*(select|with|explain)\\b") {
            set $demo_sql_allowed 1;
        }
        if ($demo_sql_allowed = 0) {
            return 403;
        }

        proxy_pass http://packetql:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/ {
        limit_except GET HEAD OPTIONS {
            deny all;
        }

        proxy_pass http://packetql:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        proxy_pass http://packetql:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
