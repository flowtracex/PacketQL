<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PacketQL Demo</title>
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar">
      <div class="sidebar-brand">
        <div class="sidebar-kicker">FlowtraceX</div>
        <div class="sidebar-title">PacketQL Demo</div>
      </div>

      <nav class="sidebar-nav">
        <button class="nav-item active" data-page="upload">PCAP Upload</button>
        <button class="nav-item" data-page="dashboard">Log Dashboard</button>
        <button class="nav-item" data-page="search">Log Search</button>
        <button class="nav-item" data-page="sql">SQL Query</button>
        <button class="nav-item" data-page="health">Pipeline Health</button>
      </nav>

      <div class="sidebar-note">
        Read-only static demo with hard-coded data and no backend runtime.
      </div>
    </aside>

    <main class="main-panel">
      <header class="topbar">
        <div class="topbar-brand">
          <div class="topbar-wordmark">PacketQL</div>
          <div class="topbar-subtitle">Packet investigation, simplified</div>
        </div>

        <div class="topbar-controls">
          <button id="howItWorksButton" class="ghost-button">How It Works</button>
          <div class="source-picker">
            <label for="sourceSelect">Select Source</label>
            <select id="sourceSelect"></select>
          </div>
        </div>
      </header>

      <section class="source-bar">
        <div>
          <div class="source-bar-label">Current Source</div>
          <div id="sourceName" class="source-bar-name"></div>
        </div>
        <div class="source-meta">
          <span id="sourceUploaded"></span>
          <span id="sourceProcessed"></span>
        </div>
      </section>

      <section id="page-upload" class="page active"></section>
      <section id="page-dashboard" class="page"></section>
      <section id="page-search" class="page"></section>
      <section id="page-sql" class="page"></section>
      <section id="page-health" class="page"></section>
    </main>
  </div>

  <div id="modalRoot"></div>

  <script src="./mock-data.js"></script>
  <script src="./app.js"></script>
</body>
</html>
